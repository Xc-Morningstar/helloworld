<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>随机音乐播放器</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: white;
            text-align: center;
            overflow: hidden;
        }
        .container {
            max-width: 500px;
            padding: 30px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        h1 {
            margin-top: 0;
            color: #4cc9f0;
            text-shadow: 0 0 10px rgba(76, 201, 240, 0.5);
        }
        .player {
            margin: 25px 0;
        }
        #audioPlayer {
            width: 100%;
            margin-top: 15px;
        }
        .song-info {
            background: rgba(255, 255, 255, 0.1);
            padding: 12px;
            border-radius: 10px;
            margin-top: 15px;
            min-height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn {
            background: #4cc9f0;
            border: none;
            color: #1a1a2e;
            padding: 12px 25px;
            font-size: 16px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            margin-top: 10px;
        }
        .btn:hover {
            background: #72efdd;
            transform: scale(1.05);
        }
        .loading {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: #4cc9f0;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎵 随机四小队bgm(有彩蛋) 🎵</h1>
        
        <div class="player">
            <div id="loading" class="loading"></div>
            <audio id="audioPlayer" controls></audio>
            <div class="song-info" id="songInfo">正在随机选择歌曲...</div>
        </div>
        
        <button class="btn" onclick="playRandomSong()">换一首</button>
    </div>

        // ====== 仅需修改上方数组内容 ======

            "%E5%BC%A0%E7%94%B3%E9%AA%8B%2C%E5%88%98%E6%80%9D%E7%BB%B4%2C%E6%9D%BE%E5%A4%A9%E7%A1%95%2C%E6%9C%B1%E7%BE%8E%E5%90%89%2C%E7%8E%8B%E5%A4%A9%E6%94%BE_-_%E5%96%9C%E4%BA%BA%E5%A5%87%E5%A6%99%E5%A4%9C%E8%80%B6%E8%80%B6%E8%80%B6.mp3": "彩蛋 - 喜人奇妙夜耶耶耶",
            "Maria_Cordero_-_%E5%8F%8B%E8%B0%8A%E4%B9%8B%E5%85%89.mp3": "旧警察故事 - 友谊之光",

            "%E5%BE%90%E5%8C%96%E6%96%87%EF%BC%88%E5%9B%9B%E7%86%B9%E4%B8%B8%E5%AD%90%EF%BC%89_-_%E7%A7%8B%E9%A3%8E.mp3": "领养日 - 秋风",

            "you_-_Sokka.mp3": "一起去露营 - Sokka",
            "SATV_Music_-_Ready.mp3": "白日梦想家庭 - Ready",
            "%E5%BC%A0%E6%B4%A2%E8%B1%AA_-_Forever_Star.mp3": "恋恋火锅店 - Forever Star",
            "Ryan_Mack_-_Forever_and_Ever_and_Always_%28The_Softer_Version%29.mp3": "密室大作战 - Forever and Ever and Always (The Softer Version)"
            // ...其他歌曲映射（格式：文件名: "显示名称"）
        };

        function getFileName(url) {
            return url.substring(url.lastIndexOf('/') + 1);
        }

        function playRandomSong() {
            document.getElementById('loading').style.display = 'block';
            const randomIndex = Math.floor(Math.random() * songUrls.length);
            const audio = document.getElementById('audioPlayer');
            const songInfo = document.getElementById('songInfo');
            
            audio.src = songUrls[randomIndex];
            audio.load();
            
            // 尝试获取友好名称
            const fileName = getFileName(songUrls[randomIndex]);
            songInfo.textContent = songTitles[fileName] || `正在播放: ${fileName}`;
            
            audio.oncanplaythrough = () => {
                document.getElementById('loading').style.display = 'none';
                audio.play().catch(e => {
                    songInfo.innerHTML = `⚠️ 浏览器阻止自动播放<br>请点击播放按钮`;
                });
            };
        }

        // 页面加载时自动播放
        window.addEventListener('load', () => {
            // 移动端需用户交互才能自动播放，先隐藏加载动画
            setTimeout(() => {
                document.getElementById('loading').style.display = 'none';
            }, 3000);
            
            // 尝试自动播放（部分浏览器允许）
            playRandomSong();
        });
    </script>
</body>
</html>
